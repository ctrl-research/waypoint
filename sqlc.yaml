version: "2"
sql:
  - engine: "postgresql"
    schema: "migrations"
    queries: "internal/store/queries"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/store/sqlcgen"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        rename:
          avatar_url: "AvatarURL"
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true
          - db_type: "pg_catalog.timestamptz"
            go_type: "time.Time"
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "pg_catalog.date"
            go_type: "time.Time"
          - db_type: "date"
            go_type: "time.Time"
          - db_type: "pg_catalog.date"
            nullable: true
            go_type:
              type: "time.Time"
              pointer: true
          - db_type: "date"
            nullable: true
            go_type:
              type: "time.Time"
              pointer: true
          - db_type: "citext"
            go_type: "string"
          # start_time is a `time` column; the Go API speaks "HH:MM" strings
          # with "" meaning unscheduled (see queries/items.sql).
          - column: "itinerary_items.start_time"
            go_type: "string"
