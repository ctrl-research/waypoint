services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      WAYPOINT_ADDR: ":8080"
      WAYPOINT_DATABASE_URL: postgres://waypoint:${POSTGRES_PASSWORD:-waypoint}@postgres:5432/waypoint?sslmode=disable
      WAYPOINT_DATA_DIR: /data
    volumes:
      - waypoint-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: waypoint
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-waypoint}
      POSTGRES_DB: waypoint
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waypoint"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  postgres-data:
  waypoint-data:
